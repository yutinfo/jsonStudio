<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSON Studio</title>
    <meta name="description" content="Modern JSON viewer and editor with raw, tree, and table modes." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      window.tailwind = window.tailwind || {};
      window.tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: { ink: "#10253F", mist: "#F3F7FB", ocean: "#0F6CBD", seafoam: "#D7F5EA", coral: "#F97360", sand: "#FFF6E9" },
            boxShadow: { panel: "0 18px 50px rgba(15, 35, 59, 0.10)", soft: "0 10px 30px rgba(15, 35, 59, 0.08)" },
            fontFamily: { sans: ["Manrope", "Segoe UI", "sans-serif"], mono: ["IBM Plex Mono", "monospace"] }
          }
        }
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-900 antialiased">
    <div class="app-shell">
      <!-- Background blobs -->
      <div class="pointer-events-none absolute inset-0 overflow-hidden">
        <div class="absolute -left-16 top-12 h-64 w-64 rounded-full bg-cyan-200/50 blur-3xl dark:bg-cyan-500/10"></div>
        <div class="absolute right-0 top-0 h-96 w-96 rounded-full bg-orange-200/40 blur-3xl dark:bg-orange-500/10"></div>
        <div class="absolute bottom-0 left-1/3 h-72 w-72 rounded-full bg-teal-200/30 blur-3xl dark:bg-emerald-500/10"></div>
      </div>

      <main class="app-main relative">

        <!-- Compact header bar -->
        <header class="app-header rounded-lg border border-white/60 bg-white/80 shadow-panel backdrop-blur-xl dark:border-white/10 dark:bg-slate-900/80">
          <div class="flex flex-wrap items-center gap-3 px-4 py-2">
            <span class="inline-flex items-center rounded border border-cyan-200 bg-cyan-50 px-2.5 py-0.5 text-[10px] font-bold uppercase tracking-[0.2em] text-cyan-800 dark:border-cyan-400/20 dark:bg-cyan-400/10 dark:text-cyan-200">
              JSON Studio
            </span>
            <div class="h-3.5 w-px shrink-0 bg-slate-200 dark:bg-slate-700"></div>
            <span id="modeSummary" class="text-xs font-bold text-slate-800 dark:text-white">Table</span>
            <span class="select-none text-slate-300 dark:text-slate-600">·</span>
            <span id="jsonStats" class="text-xs text-slate-500 dark:text-slate-400">0 keys</span>
            <div class="ml-auto flex items-center gap-1.5">
              <button data-action="expand-all" class="btn-tool" title="Expand all tree nodes">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="7 20 12 15 17 20"/><polyline points="7 4 12 9 17 4"/></svg>
                Expand All
              </button>
              <button data-action="collapse-all" class="btn-tool" title="Collapse all tree nodes">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="7 8 12 13 17 8"/><polyline points="7 16 12 11 17 16"/></svg>
                Collapse All
              </button>
              <button id="themeToggle" class="btn-tool" type="button" title="Toggle dark / light mode">
                <svg class="btn-icon block dark:hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
                <svg class="btn-icon hidden dark:block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                Dark Mode
              </button>
            </div>
          </div>
        </header>

        <!-- Toolbar -->
        <section class="app-toolbar rounded-lg border border-white/60 bg-white/80 shadow-panel backdrop-blur-xl dark:border-white/10 dark:bg-slate-900/80">
          <div class="flex flex-wrap items-center gap-1.5 px-3 py-2">
            <button data-action="sample" class="btn-tool btn-tool-primary" title="Load sample JSON">
              <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              Sample
            </button>
            <button id="prettifyBtn" data-action="prettify" class="btn-tool" title="Prettify / format JSON">
              <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" y1="10" x2="7" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="7" y2="18"/></svg>
              Prettify
            </button>
            <button id="applyRawBtn" data-action="apply-text" class="btn-tool" title="Apply raw edits (Cmd/Ctrl+Enter)">
              <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              Apply Raw
            </button>
            <div class="h-3.5 w-px shrink-0 bg-slate-200 dark:bg-slate-700"></div>
            <button data-action="copy" class="btn-tool" title="Copy JSON to clipboard">
              <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
              Copy
            </button>
            <button data-action="download" class="btn-tool" title="Download as JSON file">
              <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Download
            </button>
            <button data-action="upload" class="btn-tool" title="Upload JSON file">
              <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Upload
            </button>
            <button data-action="undo" class="btn-tool" title="Undo last action">
              <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 00-4-4H4"/></svg>
              Undo
            </button>
            <button data-action="open-extract" class="btn-tool" title="Extract values by key">
              <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
              Extract
            </button>
            <!-- Delete by key — multi-select dropdown -->
            <div class="h-3.5 w-px shrink-0 bg-slate-200 dark:bg-slate-700"></div>
            <div class="key-multiselect" id="deleteKeySelect">
              <button class="key-ms-trigger" id="deleteKeyTrigger" type="button" title="Select columns to delete from entire JSON">
                <svg class="btn-icon shrink-0 opacity-50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                <span class="key-ms-trigger-label" id="deleteKeyLabel">Select columns…</span>
                <svg class="key-ms-caret btn-icon shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <div class="key-ms-panel hidden" id="deleteKeyPanel">
                <div class="key-ms-search">
                  <input type="text" id="deleteKeySearch" placeholder="Filter columns…" class="key-ms-filter" />
                </div>
                <div class="key-ms-actions">
                  <button type="button" id="deleteKeySelectAll" class="key-ms-action-btn">All</button>
                  <button type="button" id="deleteKeySelectNone" class="key-ms-action-btn">None</button>
                  <span class="key-ms-count" id="deleteKeyCount"></span>
                </div>
                <div class="key-ms-list" id="deleteKeyOptions"></div>
                <p class="key-ms-empty hidden" id="deleteKeyEmpty">No columns in current view</p>
              </div>
            </div>
            <button data-action="delete-by-key" class="btn-tool btn-tool-danger" title="Delete selected keys from entire JSON">
              Delete Key
            </button>
            <div class="h-3.5 w-px shrink-0 bg-slate-200 dark:bg-slate-700"></div>
            <button data-action="reset" class="btn-tool btn-tool-danger" title="Reset to default JSON">
              <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
              Reset
            </button>
            <input id="fileInput" class="hidden" type="file" accept=".json,application/json" />
          </div>
        </section>

        <!-- Two-panel workspace with draggable resizer -->
        <div id="workspaceContainer" class="app-workspace">

          <!-- Left panel: Raw JSON -->
          <article id="leftPanel" class="workspace-panel rounded-lg border border-white/60 bg-white/80 shadow-panel backdrop-blur-xl dark:border-white/10 dark:bg-slate-900/80">

            <!-- Left panel header -->
            <div class="flex flex-col gap-2 border-b border-slate-200/70 px-4 py-2.5 dark:border-slate-700/80 shrink-0">
              <div class="flex items-center justify-between">
                <h2 class="text-sm font-bold text-slate-900 dark:text-white">Raw JSON</h2>
                <label class="inline-flex items-center gap-2 text-xs font-medium text-slate-600 dark:text-slate-300">
                  <input id="wrapToggle" type="checkbox" class="h-3.5 w-3.5 rounded border-slate-300 text-cyan-600 focus:ring-cyan-500" checked />
                  Wrap
                </label>
              </div>
              <div class="flex items-center gap-2">
                <input id="searchInput" type="text" placeholder="Search keys / values…" class="field-input min-w-0 flex-1" />
                <span id="searchCount" class="text-xs text-slate-500 dark:text-slate-400 whitespace-nowrap shrink-0"></span>
              </div>
            </div>

            <!-- Left panel body -->
            <div class="workspace-panel-body px-3 pb-2 pt-2.5">
              <div class="editor-wrapper flex overflow-hidden rounded-lg border border-slate-200/80 dark:border-slate-700">
                <div id="lineNumbers" class="line-numbers" aria-hidden="true"></div>
                <textarea
                  id="jsonInput"
                  spellcheck="false"
                  class="editor-area workspace-editor w-full bg-slate-950 p-4 font-mono text-sm leading-7 text-cyan-100 shadow-inner outline-none"
                  placeholder='Paste JSON here...&#10;{&#10;  "hello": "world"&#10;}'
                ></textarea>
              </div>
              <div class="mt-1.5 flex items-center justify-between gap-2">
                <p id="rawStatus" class="text-xs text-slate-500 dark:text-slate-400 truncate">Ready.</p>
                <span class="text-[10px] font-semibold tracking-[0.18em] text-slate-400 dark:text-slate-500 shrink-0 rounded border border-slate-200 px-2 py-0.5 dark:border-slate-700">Cmd/Ctrl+Enter</span>
              </div>
            </div>
          </article>

          <!-- Draggable resizer -->
          <div id="panelResizer" class="panel-resizer" title="Drag to resize panels"></div>

          <!-- Right panel: Structured view -->
          <article id="rightPanel" class="workspace-panel rounded-lg border border-white/60 bg-white/80 shadow-panel backdrop-blur-xl dark:border-white/10 dark:bg-slate-900/80">

            <!-- Right panel header -->
            <div class="border-b border-slate-200/70 px-4 py-2.5 dark:border-slate-700/80 shrink-0">
              <div class="flex items-center justify-between">
                <h2 class="text-sm font-bold text-slate-900 dark:text-white">Structured View</h2>
                <div class="inline-flex rounded border border-slate-200 bg-slate-50 p-1 dark:border-slate-700 dark:bg-slate-800">
                  <button data-mode="pretty" class="mode-tab">Pretty</button>
                  <button data-mode="tree" class="mode-tab is-active">Tree</button>
                  <button data-mode="table" class="mode-tab">Table</button>
                </div>
              </div>
            </div>

            <!-- Right panel body -->
            <div class="workspace-panel-body px-3 pb-2 pt-2.5">
              <!-- Table breadcrumbs toolbar -->
              <div id="tableToolbar" class="mb-1 hidden shrink-0">
                <nav id="breadcrumb" class="flex flex-wrap items-center gap-0.5"></nav>
              </div>

              <div id="structuredStatus" class="mb-2 hidden rounded border px-3 py-2 text-xs font-medium shrink-0"></div>

              <div id="prettyView" class="workspace-scroll hidden overflow-auto pr-1"></div>
              <div id="treeView" class="workspace-scroll overflow-auto pr-1"></div>
              <div id="tableView" class="workspace-scroll hidden"></div>
            </div>
          </article>

        </div><!-- end workspaceContainer -->
      </main>

      <!-- Toast container -->
      <aside
        id="toastContainer"
        class="pointer-events-none fixed right-4 top-4 z-50 flex w-[min(24rem,calc(100vw-2rem))] flex-col gap-3"
      ></aside>

      <!-- Confirm modal -->
      <div id="confirmModal" class="fixed inset-0 z-[60] hidden items-center justify-center bg-slate-950/50 p-4 backdrop-blur-sm">
        <div class="w-full max-w-md rounded-[28px] border border-white/20 bg-white p-6 shadow-panel dark:border-white/10 dark:bg-slate-900">
          <p class="text-xs font-semibold uppercase tracking-[0.24em] text-slate-500 dark:text-slate-400">Confirm Action</p>
          <h3 id="confirmTitle" class="mt-3 text-2xl font-bold text-slate-900 dark:text-white"></h3>
          <p id="confirmMessage" class="mt-3 text-sm leading-7 text-slate-600 dark:text-slate-300"></p>
          <div class="mt-6 flex justify-end gap-3">
            <button id="confirmCancel" class="btn-secondary">Cancel</button>
            <button id="confirmAccept" class="btn-danger">Confirm</button>
          </div>
        </div>
      </div>

      <!-- Extract modal -->
      <div id="extractModal" class="fixed inset-0 z-[60] hidden items-center justify-center bg-slate-950/50 p-4 backdrop-blur-sm">
        <div class="w-full max-w-lg rounded-lg border border-white/20 bg-white shadow-panel dark:border-white/10 dark:bg-slate-900">
          <div class="flex items-center justify-between border-b border-slate-200/70 px-5 py-3 dark:border-slate-700/80">
            <div>
              <p class="text-[10px] font-semibold uppercase tracking-[0.2em] text-slate-500 dark:text-slate-400">Tool</p>
              <h3 class="text-sm font-bold text-slate-900 dark:text-white">Extract Values by Key</h3>
            </div>
            <button data-action="close-extract" class="btn-tool" title="Close">✕</button>
          </div>
          <div class="flex flex-wrap items-end gap-3 px-5 py-4">
            <label class="flex flex-col gap-1">
              <span class="text-[10px] font-semibold uppercase tracking-[0.2em] text-slate-500 dark:text-slate-400">Key to find</span>
              <input id="extractKey" type="text" placeholder="e.g. isBaseUnit" class="field-input" style="min-width:11rem;" />
            </label>
            <label class="flex flex-col gap-1">
              <span class="text-[10px] font-semibold uppercase tracking-[0.2em] text-slate-500 dark:text-slate-400">Root ID field</span>
              <input id="extractIdKey" type="text" placeholder="id" value="id" class="field-input" style="min-width:7rem;" />
            </label>
            <button data-action="run-extract" class="btn-tool btn-tool-primary self-end">Extract</button>
          </div>
          <div id="extractResults" class="hidden border-t border-slate-200/70 px-5 pb-4 pt-3 dark:border-slate-700/80">
            <div class="flex items-center justify-between mb-2">
              <span id="extractCount" class="text-xs text-slate-500 dark:text-slate-400"></span>
              <button data-action="copy-extract" class="btn-tool">Copy JSON</button>
            </div>
            <textarea id="extractOutput" readonly spellcheck="false"
              class="w-full rounded border border-slate-200 dark:border-slate-700 bg-slate-950 p-4 font-mono text-xs leading-5 text-cyan-100 outline-none resize-y"
              style="min-height:8rem;max-height:20rem;"
            ></textarea>
          </div>
        </div>
      </div>

      <!-- Export modal -->
      <div id="exportModal" class="fixed inset-0 z-[60] hidden items-center justify-center bg-slate-950/70 backdrop-blur-sm">
        <div class="export-modal-box">
          <div class="export-modal-header">
            <div>
              <p class="export-modal-title">Export Filtered View</p>
              <p id="exportModalDesc" class="export-modal-desc"></p>
            </div>
            <div class="export-modal-actions">
              <button id="exportModalCopy" class="btn-tool btn-tool-primary">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                Copy JSON
              </button>
              <button id="exportModalDownload" class="btn-tool">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Save File
              </button>
              <button id="exportModalClose" class="btn-tool" title="Close">✕</button>
            </div>
          </div>
          <textarea id="exportModalOutput" readonly spellcheck="false" class="export-modal-output"></textarea>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
